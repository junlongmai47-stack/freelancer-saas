{% extends "base.html" %}

{% block title %}添加客户 - FreelanceFlow{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
    <h1 style="margin-bottom: 2rem;">添加客户</h1>
    
    <div class="card">
        <form method="POST">
            <div class="form-group">
                <label for="name">客户名称 *</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="company">公司名称</label>
                <input type="text" id="company" name="company">
            </div>
            
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email">
            </div>
            
            <div class="form-group">
                <label for="phone">电话</label>
                <input type="tel" id="phone" name="phone">
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">添加客户</button>
                <a href="{{ url_for('clients') }}" class="btn btn-secondary" style="flex: 1; text-align: center;">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
