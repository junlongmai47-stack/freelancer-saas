{% extends "base.html" %}

{% block title %}登录 - FreelanceFlow{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 3rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">登录</h2>
        
        <form method="POST">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem;">
                登录
            </button>
        </form>
        
        <p style="text-align: center; margin-top: 1rem; color: #6b7280;">
            没有账户？<a href="{{ url_for('register') }}" style="color: #667eea; text-decoration: none;">注册</a>
        </p>
    </div>
</div>
{% endblock %}
