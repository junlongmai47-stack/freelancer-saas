{% extends "base.html" %}

{% block title %}注册 - FreelanceFlow{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 3rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">注册账户</h2>
        
        <form method="POST">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="form-group">
                <label for="company_name">公司/个人名称（可选）</label>
                <input type="text" id="company_name" name="company_name">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem;">
                注册
            </button>
        </form>
        
        <p style="text-align: center; margin-top: 1rem; color: #6b7280;">
            已有账户？<a href="{{ url_for('login') }}" style="color: #667eea; text-decoration: none;">登录</a>
        </p>
    </div>
</div>
{% endblock %}
