{% extends "base.html" %}

{% block title %}创建发票 - FreelanceFlow{% endblock %}

{% block content %}
<div style="max-width: 700px; margin: 2rem auto;">
    <h1 style="margin-bottom: 2rem;">创建发票</h1>
    
    <div class="card">
        <form method="POST">
            <div class="form-group">
                <label for="client_id">选择客户 *</label>
                <select id="client_id" name="client_id" required>
                    <option value="">-- 选择���户 --</option>
                    {% for client in clients %}
                        <option value="{{ client.id }}">{{ client.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="project_id">项目（可选）</label>
                <select id="project_id" name="project_id">
                    <option value="">-- 选择项目 --</option>
                    {% for project in projects %}
                        <option value="{{ project.id }}">{{ project.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="due_date">应付期限</label>
                <input type="date" id="due_date" name="due_date">
            </div>
            
            <h3 style="margin-top: 2rem; margin-bottom: 1rem;">发票项目</h3>
            
            <div id="invoice-items">
                <div class="invoice-item" style="display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 0.5rem; margin-bottom: 1rem;">
                    <input type="text" name="item_description" placeholder="项目描述" required>
                    <input type="number" name="item_quantity" placeholder="数量" step="0.01" min="0" value="1" required>
                    <input type="number" name="item_price" placeholder="单价" step="0.01" min="0" required>
                    <button type="button" class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">删除</button>
                </div>
            </div>
            
            <button type="button" class="btn btn-secondary" onclick="addInvoiceItem()">+ 添加项目</button>
            
            <div class="form-group" style="margin-top: 1.5rem;">
                <label for="amount">总金额 ($) *</label>
                <input type="number" id="amount" name="amount" step="0.01" min="0" required>
            </div>
            
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">创建发票</button>
                <a href="{{ url_for('invoices') }}" class="btn btn-secondary" style="flex: 1; text-align: center;">取消</a>
            </div>
        </form>
    </div>
</div>

<script>
function addInvoiceItem() {
    const container = document.getElementById('invoice-items');
    const newItem = document.createElement('div');
    newItem.className = 'invoice-item';
    newItem.style.cssText = 'display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 0.5rem; margin-bottom: 1rem;';
    newItem.innerHTML = `
        <input type="text" name="item_description" placeholder="项目描述" required>
        <input type="number" name="item_quantity" placeholder="数量" step="0.01" min="0" value="1" required>
        <input type="number" name="item_price" placeholder="单价" step="0.01" min="0" required>
        <button type="button" class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">删除</button>
    `;
    container.appendChild(newItem);
}
</script>
{% endblock %}
