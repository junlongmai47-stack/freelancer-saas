{% extends "base.html" %}

{% block title %}500 - 服务器错误{% endblock %}

{% block content %}
<div style="text-align: center; padding: 4rem 2rem;">
    <h1 style="font-size: 4rem; color: #ef4444; margin-bottom: 1rem;">500</h1>
    <h2 style="margin-bottom: 1rem;">服务器错误</h2>
    <p style="color: #6b7280; margin-bottom: 2rem;">抱歉，服务器出错了。请稍后重试。</p>
    <a href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('index') }}" class="btn btn-primary">
        返回首页
    </a>
</div>
{% endblock %}
