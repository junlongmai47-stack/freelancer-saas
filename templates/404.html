{% extends "base.html" %}

{% block title %}404 - 页面未找到{% endblock %}

{% block content %}
<div style="text-align: center; padding: 4rem 2rem;">
    <h1 style="font-size: 4rem; color: #667eea; margin-bottom: 1rem;">404</h1>
    <h2 style="margin-bottom: 1rem;">页面未找到</h2>
    <p style="color: #6b7280; margin-bottom: 2rem;">抱歉，你访问的页面不存在。</p>
    <a href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('index') }}" class="btn btn-primary">
        返回首页
    </a>
</div>
{% endblock %}
